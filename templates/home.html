<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Indicator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .main-container {
            max-width: 700px;
            margin: 50px auto;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.07);
        }
        .card-header {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: #ffffff;
            border-top-left-radius: 15px !important;
            border-top-right-radius: 15px !important;
            padding: 25px;
            text-align: center;
        }
        .card-header h2 {
            font-weight: 600;
            margin: 0;
            font-size: 1.6rem;
        }
        .card-body {
            padding: 40px;
            background-color: #ffffff;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }
        .form-label {
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #d1d5db;
            transition: all 0.2s ease-in-out;
        }
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .btn-predict {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn-predict:hover {
            opacity: 0.9;
            color: white;
        }
        .result-box {
            background-color: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
        }
        .result-box h3 {
            color: #065f46;
            margin: 0;
            font-weight: 600;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="card">
        <div class="card-header">
            <h2>Student Exam Performance Indicator</h2>
        </div>
        <div class="card-body">
            <form action="{{ url_for('predict_datapoint')}}" method="post">
                
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender" required>
                            <option selected disabled value="">Select your Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Race or Ethnicity</label>
                        <select class="form-select" name="race_ethnicity" required>
                            <option selected disabled value="">Select Ethnicity</option>
                            <option value="group A">Group A</option>
                            <option value="group B">Group B</option>
                            <option value="group C">Group C</option>
                            <option value="group D">Group D</option>
                            <option value="group E">Group E</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Parental Level of Education</label>
                    <select class="form-select" name="parental_level_of_education" required>
                        <option selected disabled value="">Select Parent Education</option>
                        <option value="associate's degree">Associate's Degree</option>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="high school">High School</option>
                        <option value="master's degree">Master's Degree</option>
                        <option value="some college">Some College</option>
                        <option value="some high school">Some High School</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Lunch Type</label>
                        <select class="form-select" name="lunch" required>
                            <option selected disabled value="">Select Lunch Type</option>
                            <option value="free/reduced">Free/Reduced</option>
                            <option value="standard">Standard</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Test Preparation Course</label>
                        <select class="form-select" name="test_preparation_course" required>
                            <option selected disabled value="">Select Course Status</option>
                            <option value="none">None</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Reading Score (out of 100)</label>
                        <input class="form-control" type="number" name="reading_score" placeholder="0-100" min="0" max="100" required />
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Writing Score (out of 100)</label>
                        <input class="form-control" type="number" name="writing_score" placeholder="0-100" min="0" max="100" required />
                    </div>
                </div>

                <div class="mt-2">
                    <button class="btn btn-predict" type="submit">Predict your Maths Score</button>
                </div>
            </form>

            {% if results %}
            <div class="result-box">
                <h3>Predicted Maths Score: {{results}}</h3>
            </div>
            {% endif %}
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
